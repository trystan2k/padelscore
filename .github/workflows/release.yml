name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - 'v*'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (
        github.event.workflow_run.head_branch == 'main' ||
        startsWith(github.event.workflow_run.head_branch, 'v')
      ) &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-24-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-24-modules-

      - name: Install zeus cli
        run: npm install -g @zeppos/zeus-cli

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Check for releasable changes
        id: check-changes
        run: |
          # Get the latest release tag (semantic version tags like v1.0.0)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # Define releasable paths (code that affects the app)
          RELEASABLE="page/|app.js|app.json|utils/|assets/|shared/"

          if [ -z "$LAST_TAG" ]; then
            # No tags exist, this is the first release
            echo "No previous tags found - proceeding with first release"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            # Compare all changes since last release tag
            CHANGED_FILES=$(git diff --name-only $LAST_TAG HEAD)

            echo "Checking changes since last release ($LAST_TAG):"
            echo "$CHANGED_FILES" | head -20

            # Check if any releasable files changed
            if echo "$CHANGED_FILES" | grep -qE "^($RELEASABLE)"; then
              echo "Releasable changes detected since $LAST_TAG"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "No releasable changes since $LAST_TAG - skipping release"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create Release
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
